name: Package Integration Tests

on:
  workflow_call:
    inputs:
      command:
        description: "The command to run for running the package integration tests."
        required: false
        type: string
        default: task test:integration
      k8s_version:
        description: "The Kubernetes version to use for running the package integration tests."
        required: false
        type: string
        default: v1.35

permissions:
  contents: read

env:
  FLOX_DISABLE_METRICS: true
  HOMEBREW_NO_SANDBOX_LINUX: 1

jobs:
  test-integration:
    name: Integration Tests on ${{ inputs.k8s_version }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Install Flox
        uses: flox/install-flox-action@6e70b2624cea62b0f11ea4a28e719fe1c86c028b # v2.4.1
      
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@00f483c95eacf401cf9f4aa3746964071a747334 # master
      
      - name: Install kctrl
        run: |
          brew trust carvel-dev/carvel
          brew tap carvel-dev/carvel
          brew install kctrl
      
      - name: Run integration tests
        uses: flox/activate-action@7065dcbe5583b7b015f07a8ebd49d7266e3053e8 # v1.1.1
        env:
          K8S_VERSION: ${{ inputs.k8s_version }}
        with:
          command: ${{ inputs.command }}
